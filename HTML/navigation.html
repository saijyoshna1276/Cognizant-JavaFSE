<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Navigation Example</title>
</head>

<body>

    <!-- Navigation -->
    <nav>
        <a href="#home">Home</a>
        <a href="#events">Events</a>
        <a href="#contact">Contact</a>
    </nav>

    <!-- Home Section -->
    <section id="home">
        <h1>Home Section</h1>
        <p>Welcome to the website.</p>
    </section>

    <!-- Events Section -->
    <section id="events">
        <h1>Events Section</h1>
        <p>Upcoming events are listed here.</p>
    </section>

    <!-- Contact Section -->
    <section id="contact">
        <h1>Contact Section</h1>
        <p>Contact us here.</p>
    </section>

    <!-- External Link -->
    <a href="help.html" target="_blank">
        Open Help Page
    </a>

</body>

</html>
